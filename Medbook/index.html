<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedBook - Дәрігерге жазылу</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm">
    <div class="container">
        <a class="navbar-brand" href="index.html">MedBook</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto">
                <li class="nav-item"><a class="nav-link active" href="index.html">Басты бет</a></li>
                <li class="nav-item"><a class="nav-link" href="doctors.html">Дәрігерлер</a></li>
                <li class="nav-item"><a class="nav-link" href="blog.html">Блог</a></li>
            </ul>
            <div class="d-flex align-items-center">
                <button id="darkModeToggle" class="btn btn-outline-secondary me-2"><i class="fas fa-moon"></i></button>
                <button class="btn btn-outline-primary me-2" onclick="openAuthModal()">Кіру</button>
                <button id="profileBtn" class="btn btn-outline-secondary" onclick="viewProfile()" style="display:none;">Профиль</button>
            </div>
        </div>
    </div>
</nav>

<section class="hero-section" id="heroSection">
    <div class="container text-center hero-content">
        <h1 class="display-4 fw-bold mb-3">Дәрігерге онлайн жазылу</h1>
        <p class="lead mb-4">Қол жетімді медициналық көмек 24/7</p>
        <div class="search-box">
            <input type="text" class="form-control mb-3" id="searchInput" placeholder="Дәрігер аты немесе мамандық">
            <button class="btn btn-primary w-100" onclick="searchDoctor()">Іздеу</button>
        </div>
    </div>
</section>

<section class="doctors py-5">
    <div class="container">
        <h2 class="text-center mb-5">Танымал дәрігерлер</h2>
        <div class="row g-4" id="popularDoctors"></div>
    </div>
</section>

<!-- Модальды терезелер -->
<div class="modal fade" id="authModal" tabindex="-1">...</div>
<div class="modal fade" id="profileModal" tabindex="-1">...</div>

<footer class="footer" id="footer">
    <div class="container">
        <div class="text-center">
            <p>© 2026 MedBook. Барлық құқықтар қорғалған</p>
        </div>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="script.js"></script>
</body>
</html>
